<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Space Grotesk';
  src: url('{{ FONTS_URI }}/space-grotesk.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('{{ FONTS_URI }}/space-grotesk-ext.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
  unicode-range: U+0100-024F;
}
@font-face {
  font-family: 'Manrope';
  src: url('{{ FONTS_URI }}/manrope.woff2') format('woff2');
  font-weight: 400 800;
  font-display: swap;
}

{{ TOKENS_CSS | safe }}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: {{ WIDTH | default(1080) }}px;
  height: {{ HEIGHT | default(1350) }}px;
  overflow: hidden;
}

body {
  background: var(--color-black);
  position: relative;
}

.accent { color: var(--color-accent); }

.pill {
  position: absolute;
  top: 96px;
  left: 96px;
  display: inline-flex;
  align-items: center;
  padding: 16px 28px;
  background: var(--color-accent);
  border-radius: 999px;
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 24px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--color-black);
}

.progress {
  position: absolute;
  top: 112px;
  right: 96px;
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 28px;
  color: var(--color-accent);
  letter-spacing: 0.05em;
}

.content {
  position: absolute;
  top: 350px;
  left: 96px;
  right: 96px;
  display: flex;
  flex-direction: column;
}

.number {
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 300px;
  line-height: 0.85;
  color: var(--color-accent);
  letter-spacing: -0.05em;
  margin-bottom: 32px;
}

.title {
  font-family: var(--font-headline);
  font-weight: 600;
  font-size: 92px;
  line-height: 1.05;
  color: var(--color-light);
  letter-spacing: -0.02em;
}

.swipe {
  position: absolute;
  bottom: 140px;
  right: 96px;
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 64px;
  line-height: 1;
  color: var(--color-accent);
  letter-spacing: -0.01em;
}

.footer {
  position: absolute;
  bottom: 64px;
  left: 96px;
  right: 96px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.wordmark {
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 44px;
  letter-spacing: -0.01em;
  color: var(--color-light);
}

.wordmark .v {
  color: var(--color-accent);
}

.domain {
  font-family: var(--font-mono);
  font-weight: 400;
  font-size: 26px;
  color: var(--color-accent);
}
</style>
</head>
<body>
  <div class="pill">{{ PILL }}</div>
  {% if PROGRESS %}<div class="progress">{{ PROGRESS }}</div>{% endif %}

  <div class="content">
    <div class="number">{{ NUMBER }}.</div>
    <div class="title">{{ TITLE | safe }}</div>
  </div>

  <div class="swipe">→</div>

  <div class="footer">
    <div class="wordmark">Escape <span class="v">Velocity</span></div>
    <div class="domain">escapevelocity.consulting</div>
  </div>
</body>
</html>
