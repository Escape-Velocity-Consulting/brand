<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

@font-face {
  font-family: 'Space Grotesk';
  src: url('{{ FONTS_URI }}/space-grotesk.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('{{ FONTS_URI }}/space-grotesk-ext.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
  unicode-range: U+0100-024F;
}
@font-face {
  font-family: 'Manrope';
  src: url('{{ FONTS_URI }}/manrope.woff2') format('woff2');
  font-weight: 400 800;
  font-display: swap;
}
@font-face {
  font-family: 'Inter';
  src: url('{{ FONTS_URI }}/inter.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
}
@font-face {
  font-family: 'Inter';
  src: url('{{ FONTS_URI }}/inter-ext.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
  unicode-range: U+0100-024F;
}

{{ TOKENS_CSS | safe }}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
}

body {
  background: var(--color-black);
  position: relative;
  font-family: var(--font-body);
}

.accent-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--color-terracotta);
}

.wordmark {
  position: absolute;
  top: 64px;
  left: 80px;
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 42px;
  letter-spacing: -0.01em;
  color: var(--color-light);
}

.wordmark .v {
  color: var(--color-accent);
}

.content {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 80px;
  right: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.eyebrow {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 22px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--color-terracotta);
  margin-bottom: 32px;
}

.headline {
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 88px;
  line-height: 1.1;
  color: var(--color-light);
  letter-spacing: -0.015em;
  max-width: 880px;
}

.body {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 30px;
  line-height: 1.5;
  color: var(--color-muted);
  margin-top: 36px;
  max-width: 820px;
}

.footer {
  position: absolute;
  bottom: 64px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 26px;
  letter-spacing: 0.5px;
  color: var(--color-terracotta);
}
</style>
</head>
<body>
  <div class="accent-bar"></div>

  <div class="wordmark">Escape <span class="v">Velocity</span></div>

  <div class="content">
    {% if EYEBROW %}<div class="eyebrow">{{ EYEBROW }}</div>{% endif %}
    <div class="headline">{{ HEADLINE }}</div>
    {% if BODY %}<div class="body">{{ BODY }}</div>{% endif %}
  </div>

  <div class="footer">
    <div>{{ CTA | default("escapevelocity.consulting") }}</div>
  </div>
</body>
</html>
