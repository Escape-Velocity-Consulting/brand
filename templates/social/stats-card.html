<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

@font-face {
  font-family: 'Space Grotesk';
  src: url('{{ FONTS_URI }}/space-grotesk.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('{{ FONTS_URI }}/space-grotesk-ext.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
  unicode-range: U+0100-024F;
}
@font-face {
  font-family: 'Manrope';
  src: url('{{ FONTS_URI }}/manrope.woff2') format('woff2');
  font-weight: 400 800;
  font-display: swap;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1200px;
  height: 1200px;
  overflow: hidden;
}

body {
  background: #1E1C1A;
  position: relative;
}

.accent-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: #D4784A;
}

.content {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 100px;
  padding-right: 100px;
}

.stat-line {
  display: flex;
  align-items: baseline;
  gap: 16px;
}

.stat {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 260px;
  line-height: 1.0;
  color: #D4784A;
}

.unit {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 104px;
  line-height: 1.0;
  color: #D4784A;
}

.label {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 64px;
  color: #F5F3F0;
  margin-top: 32px;
}

.context {
  font-family: 'Manrope', sans-serif;
  font-weight: 400;
  font-size: 36px;
  color: #C4BEB8;
  margin-top: 16px;
}

.footer {
  position: absolute;
  bottom: 48px;
  left: 100px;
  right: 100px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.wordmark {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 51px;
  letter-spacing: -0.01em;
  color: #F5F3F0;
}

.wordmark .v {
  color: #E8865A;
}

.domain {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
  font-size: 30px;
  color: #D4784A;
}
</style>
</head>
<body>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="stat-line">
      <div class="stat">{{ STAT }}</div>
      {% if UNIT %}<div class="unit">{{ UNIT | default("") }}</div>{% endif %}
    </div>
    <div class="label">{{ LABEL }}</div>
    {% if CONTEXT %}<div class="context">{{ CONTEXT | default("") }}</div>{% endif %}
  </div>

  <div class="footer">
    <div class="wordmark">Escape <span class="v">Velocity</span></div>
    <div class="domain">escapevelocity.consulting</div>
  </div>
</body>
</html>
