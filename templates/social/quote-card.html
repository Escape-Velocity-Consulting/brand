<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

@font-face {
  font-family: 'Space Grotesk';
  src: url('{{ FONTS_URI }}/space-grotesk.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('{{ FONTS_URI }}/space-grotesk-ext.woff2') format('woff2');
  font-weight: 400 700;
  font-display: swap;
  unicode-range: U+0100-024F;
}
@font-face {
  font-family: 'Manrope';
  src: url('{{ FONTS_URI }}/manrope.woff2') format('woff2');
  font-weight: 400 800;
  font-display: swap;
}

{{ TOKENS_CSS | safe }}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1200px;
  height: 1200px;
  overflow: hidden;
}

body {
  background: var(--color-black);
  position: relative;
}

.accent-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--color-terracotta);
}

.quote-mark {
  position: absolute;
  top: 120px;
  left: 60px;
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 360px;
  line-height: 1;
  color: var(--color-terracotta);
  opacity: 0.15;
  user-select: none;
}

.content {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 80px;
  padding-right: 80px;
  padding-bottom: 120px;
}

.quote {
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 78px;
  line-height: 1.2;
  color: var(--color-light);
  max-width: 1060px;
}

.author {
  font-family: var(--font-ui);
  font-weight: 500;
  font-size: 48px;
  color: var(--color-muted);
  margin-top: 40px;
}

.role {
  font-family: var(--font-ui);
  font-weight: 400;
  font-size: 45px;
  color: var(--color-subtle);
  margin-top: 6px;
}

.footer {
  position: absolute;
  bottom: 48px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.wordmark {
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 51px;
  letter-spacing: -0.01em;
  color: var(--color-light);
}

.wordmark .v {
  color: var(--color-accent);
}

.domain {
  font-family: var(--font-mono);
  font-weight: 400;
  font-size: 30px;
  color: var(--color-terracotta);
}
</style>
</head>
<body>
  <div class="accent-bar"></div>

  <div class="quote-mark">&ldquo;</div>

  <div class="content">
    <div class="quote">{{ QUOTE }}</div>
    {% if AUTHOR %}<div class="author">&mdash; {{ AUTHOR }}</div>{% endif %}
    {% if ROLE %}<div class="role">{{ ROLE }}</div>{% endif %}
  </div>

  <div class="footer">
    <div class="wordmark">Escape <span class="v">Velocity</span></div>
    <div class="domain">escapevelocity.consulting</div>
  </div>
</body>
</html>
