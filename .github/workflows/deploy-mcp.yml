name: Deploy MCP

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'templates/**'
      - 'fonts/**'
      - 'components/**'
      - 'tokens.ts'
      - 'tokens.css'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.mcp.json'
      - 'scripts/build-tokens.ts'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/deploy-mcp.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/escape-velocity-consulting/brand-mcp

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=prod
            type=sha,prefix=sha-,format=short

      # Build once into the local Docker daemon so Trivy can scan the same
      # image we'll push if scanning succeeds.
      - name: Build (load into local daemon for scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Extract the 7-char short SHA that docker/metadata-action uses for the
      # sha- tag (github.sha is the full 40-char hash — wrong format for Trivy).
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - id: push
        name: Push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy job — enable once the server admin has confirmed:
  #   - DNS for mcp.escapevelocity.consulting points at their VM
  #   - GitHub repo has GCP_SA_KEY secret (provided by admin)
  #   - `/usr/local/bin/deploy-service brand-mcp` is installed on the VM
  # Until then, comment out the deploy job (or skip via `if: false`) so the
  # workflow stops after `build` and only pushes images.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.MCP_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Trigger deploy on web-server
        run: |
          gcloud compute ssh web-server --zone=us-central1-a --tunnel-through-iap \
            --command="sudo /usr/local/bin/deploy-service brand-mcp ${{ needs.build.outputs.digest }}"
